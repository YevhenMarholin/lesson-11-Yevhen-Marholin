apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-course-app
  labels:
    app: {{ .Release.Name }}-course-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-course-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-course-app
    spec:
      containers:
        - name: course-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: APP_STORE
              value: {{ .Values.env.APP_STORE | quote }}
            - name: APP_REDIS_URL
              value: {{ .Values.env.APP_REDIS_URL | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 5